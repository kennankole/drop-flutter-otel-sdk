name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

env:
  FLUTTER_VERSION: "3.41.5" # matches drop-mobile/.gitlab-ci.yml's pinned version

jobs:
  analyze:
    name: Analyze & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: make test

  facade-contract:
    name: Facade import-graph contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify only the tracer facade imports the OTEL SDK
        run: make facade-check
