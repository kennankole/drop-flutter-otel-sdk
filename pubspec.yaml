name: drop_observability
description: >
  Shared Flutter OTEL instrumentation package for drop-mobile, drop-rider,
  and drop-admin-mobile. See OTEL_LIBRARY_PLAN.md (in drop-mobile) for the
  design and build phases.
publish_to: none
version: 1.0.1

environment:
  sdk: ^3.10.4
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.1
  # Pinned exactly (no caret) — pre-1.0 minors are breaking. See README.md's
  # L0 decision. Chosen over dartastic_opentelemetry.
  opentelemetry: 0.18.11
  # Already a transitive dep of opentelemetry; explicit here since
  # export/otlp_client.dart imports it directly (Bearer-auth http.Client).
  http: ^1.6.0
  # Matches the version already identical across drop-mobile/drop-rider/
  # drop-admin-mobile — the package takes over ownership of this dependency
  # entirely at L6/L7 adoption (apps drop their direct dep).
  sentry_flutter: ^7.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
